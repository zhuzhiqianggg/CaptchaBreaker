services:
  ocr-api-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: captcha-breaker-gpu
    image: captcha-breaker:7.0.0-gpu
    ports:
      - "8000:8000"
    volumes:
      - ocr-models-gpu:/root/.paddleocr
      - ./data:/app/data
      - ./output:/app/output
      - ./app:/app/app
      - ./scripts:/app/scripts
    environment:
      - TZ=Asia/Shanghai
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
      - WORKERS=1
      - MODEL_WARMUP=true
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 8G
          cpus: '4.0'
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r = requests.get('http://localhost:8000/health'); exit(0 if r.status_code == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ocr-models-gpu:
    driver: local
